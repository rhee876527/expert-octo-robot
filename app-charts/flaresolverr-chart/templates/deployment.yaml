apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: flaresolverr
  name: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      initContainers:
        - name: wait-for-valkey
          image: busybox
          command: ['sh', '-c', 'until nc -z {{ .Values.valkey.SERVICE }}.default.svc.cluster.local 6379; do echo "Waiting for valkey..."; sleep 2; done']
      containers:
        - env:
            - name: TZ
              value: "{{ .Values.env.TZ }}"
            - name: REDIS_URL
              value: redis://{{ .Values.valkey.SERVICE }}:6379
          image: "{{ .Values.image.repository }}@{{ .Values.image.pinned }}"
          name: flaresolverr
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8191
          livenessProbe:
            httpGet:
              path: /health
              port: 8191
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8191
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
spec:
  selector:
    app: flaresolverr
  ports:
    - protocol: TCP
      port: 8191
      targetPort: 8191